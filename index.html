<!DOCTYPE html>
<html lang="zh-TW" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#020617">
    <title>個人資產儀表板 (深色模式)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 深色模式專用全域樣式 */
        :root {
            color-scheme: dark;
        }
        body {
            background-color: #020617; /* 極深藍黑 */
            color: #f1f5f9; /* Slate 100 */
        }
        /* 優化手機點擊，防止 iPhone 自動放大 */
        input, button { font-size: 16px !important; }
        /* 針對 iOS 安全區域調整 (全螢幕 App 模式用) */
        .safe-area-pt { padding-top: calc(env(safe-area-inset-top, 0px) + 1rem); }
        .safe-area-pb { padding-bottom: calc(env(safe-area-inset-bottom, 0px) + 1rem); }
        /* 霓虹燈效果 (Glow) */
        .glow-blue { text-shadow: 0 0 10px rgba(96, 165, 250, 0.5); }
        .glow-green { text-shadow: 0 0 10px rgba(74, 222, 128, 0.5); }
        .glow-amber { text-shadow: 0 0 10px rgba(251, 191, 36, 0.5); }
    </style>
</head>
<body class="safe-area-pt p-4 md:p-8 font-sans safe-area-pb min-h-screen">
    <div class="max-w-4xl mx-auto">
        
        <div class="mb-8">
            <h1 class="text-xs font-bold text-slate-600 uppercase tracking-[0.3em] mb-3">Portfolio Overview</h1>
            <div class="bg-slate-900 text-white p-8 rounded-[2.5rem] shadow-2xl border border-slate-800 relative overflow-hidden">
                <div class="absolute -top-20 -right-20 w-60 h-60 bg-indigo-600/10 rounded-full blur-3xl"></div>
                
                <p class="text-indigo-400 text-xs font-bold uppercase tracking-[0.2em] mb-2 relative z-10">Net Worth (NTD)</p>
                <h1 id="grand-total" class="text-4xl md:text-5xl font-black tracking-tighter relative z-10 glow-blue text-indigo-100">NT$ 0</h1>
                <div id="status" class="text-[11px] text-slate-500 font-mono mt-5 bg-black/30 p-2 px-3 rounded-full inline-flex items-center gap-1.5 border border-slate-800 relative z-10">
                    <span class="relative flex h-2 w-2">
                      <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                      <span class="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span>
                    </span>
                    系統就緒
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            
            <div class="bg-slate-900 rounded-[2rem] p-6 border border-slate-800 shadow-xl relative overflow-hidden">
                <div class="flex justify-between items-center mb-6 relative z-10">
                    <h2 class="text-lg font-black text-slate-100 flex items-center gap-2">📈 投資組合</h2>
                    <span id="stock-total-label" class="bg-indigo-950 text-indigo-300 px-4 py-1.5 rounded-full text-xs font-bold font-mono border border-indigo-800 shadow-lg glow-blue">NT$ 0</span>
                </div>
                <div class="flex flex-col gap-3 mb-6 relative z-10">
                    <div class="flex gap-2.5">
                        <input id="stock-code" type="text" placeholder="代碼 (如 2330)" class="flex-1 p-4 bg-slate-800 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 font-bold text-slate-100 placeholder:text-slate-600 border border-slate-700">
                        <input id="stock-amount" type="number" placeholder="股數" class="w-28 p-4 bg-slate-800 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 font-bold text-slate-100 placeholder:text-slate-600 border border-slate-700">
                    </div>
                    <button onclick="addStockAsset()" id="add-stock-btn" class="w-full bg-indigo-600 text-white p-4 rounded-2xl font-black hover:bg-indigo-500 transition-all active:scale-95 shadow-lg shadow-indigo-700/30 flex items-center justify-center gap-2">
                        加入資產組合
                    </button>
                </div>
                <div class="space-y-1.5 relative z-10" id="stock-body-mobile">
                    </div>
            </div>

            <div class="space-y-6">
                
                <div class="bg-slate-900 rounded-[2rem] p-6 border border-slate-800 shadow-xl relative overflow-hidden">
                    <div class="flex justify-between items-center mb-6 relative z-10">
                        <h2 class="text-lg font-black text-slate-100 flex items-center gap-2">🏦 銀行/現金</h2>
                        <span id="bank-total-label" class="bg-emerald-950 text-emerald-300 px-4 py-1.5 rounded-full text-xs font-bold font-mono border border-emerald-800 shadow-lg glow-green">NT$ 0</span>
                    </div>
                    <div class="flex flex-col gap-3 mb-4 relative z-10">
                        <input id="bank-name" type="text" placeholder="銀行名稱" class="w-full p-4 bg-slate-800 rounded-2xl outline-none font-bold text-slate-100 placeholder:text-slate-600 border border-slate-700">
                        <div class="flex gap-2.5">
                            <input id="bank-balance" type="number" placeholder="金額" class="flex-1 p-4 bg-slate-800 rounded-2xl outline-none font-bold text-slate-100 placeholder:text-slate-600 border border-slate-700">
                            <button onclick="addBankAccount()" class="bg-emerald-600 text-white px-7 rounded-2xl font-black shadow-lg shadow-emerald-700/30 active:scale-95 transition-all text-xl">+</button>
                        </div>
                    </div>
                    <div id="bank-list" class="space-y-2 relative z-10"></div>
                </div>

                <div class="bg-slate-900 rounded-[2rem] p-6 border border-slate-800 shadow-xl relative overflow-hidden">
                    <div class="flex justify-between items-center mb-6 relative z-10">
                        <h2 class="text-lg font-black text-slate-100 flex items-center gap-2">🏠 房產與其他</h2>
                        <span id="other-total-label" class="bg-amber-950 text-amber-300 px-4 py-1.5 rounded-full text-xs font-bold font-mono border border-amber-800 shadow-lg glow-amber">NT$ 0</span>
                    </div>
                    <div class="flex flex-col gap-3 mb-4 relative z-10">
                        <input id="other-name" type="text" placeholder="項目 (如：台北小資宅)" class="w-full p-4 bg-slate-800 rounded-2xl outline-none font-bold text-slate-100 placeholder:text-slate-600 border border-slate-700">
                        <div class="grid grid-cols-2 gap-2.5">
                            <input id="other-value" type="number" placeholder="目前市值" class="p-4 bg-slate-800 rounded-2xl outline-none font-bold text-emerald-400 placeholder:text-slate-600 border border-slate-700">
                            <input id="other-loan" type="number" placeholder="貸款餘額" class="p-4 bg-slate-800 rounded-2xl outline-none font-bold text-red-400 placeholder:text-slate-600 border border-slate-700">
                        </div>
                        <button onclick="addOtherAsset()" class="w-full bg-amber-600 text-white p-4 rounded-2xl font-black shadow-lg shadow-amber-700/30 active:scale-95 transition-all">新增資產淨值</button>
                    </div>
                    <div id="other-list" class="space-y-2.5 relative z-10"></div>
                </div>

                <button onclick="clearAllData()" class="w-full py-6 text-slate-700 hover:text-red-500 text-[10px] font-bold tracking-widest uppercase transition-colors">Reset Global Data</button>
            </div>
        </div>
    </div>

    <script>
        // 【關鍵】請記得再次替換為你的 GAS URL
        const GAS_URL = 'https://script.google.com/macros/s/AKfycby1qy4_NA_lOQJAo0hWvuvjc-Bi1JU2zGdo3ODCKbcACoGy7POiddg4gsc2QmLl7YgFUQ/exec'; 

        let myPortfolio = JSON.parse(localStorage.getItem('myPortfolio')) || [];
        let myBanks = JSON.parse(localStorage.getItem('myBanks')) || [];
        let myOthers = JSON.parse(localStorage.getItem('myOthers')) || []; 
        let marketPrices = {};

        async function initData() {
            const status = document.getElementById('status');
            const totalDisplay = document.getElementById('grand-total');
            if (myPortfolio.length === 0 && myBanks.length === 0 && myOthers.length === 0) {
                status.innerText = "READY"; totalDisplay.innerHTML = "NT$ 0"; renderUI(); return;
            }
            status.innerHTML = '<span class="animate-pulse text-indigo-400">⏳ 同步雲端中...</span>';
            try {
                for (let item of myPortfolio) {
                    const res = await fetch(`${GAS_URL}?code=${item.code}`);
                    const data = await res.json();
                    marketPrices[item.code] = data.price || 0;
                }
                status.innerHTML = `<span class="flex items-center gap-1.5"><span class="relative flex h-2 w-2"><span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span><span class="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span></span>最後更新: ${new Date().toLocaleTimeString()}</span>`;
            } catch (e) {
                status.innerText = "OFFLINE MODE";
            }
            renderUI();
        }

        async function addStockAsset() {
            const btn = document.getElementById('add-stock-btn');
            const status = document.getElementById('status');
            const codeInput = document.getElementById('stock-code');
            const amountInput = document.getElementById('stock-amount');
            
            const code = codeInput.value.trim().toUpperCase();
            const amount = parseFloat(amountInput.value);
            
            if (!code || !amount) return;
            
            btn.innerHTML = '<span class="animate-spin text-sm">🔄</span> 查詢中...';
            btn.disabled = true;

            try {
                const res = await fetch(`${GAS_URL}?code=${code}`);
                const data = await res.json();
                
                if (!data.price) throw new Error();
                
                marketPrices[code] = data.price;
                const idx = myPortfolio.findIndex(i => i.code === code);
                if (idx > -1) myPortfolio[idx].amount = amount;
                else myPortfolio.push({ code, amount });
                
                saveAndRender();
                status.innerText = `✅ ${code} 已同步`;
            } catch (e) { alert(`無法取得 ${code} 價格`); }
            
            btn.innerText = "加入資產組合";
            btn.disabled = false;
            codeInput.value = '';
            amountInput.value = '';
        }

        function addBankAccount() {
            const name = document.getElementById('bank-name').value.trim();
            const balance = parseFloat(document.getElementById('bank-balance').value);
            if (!name || isNaN(balance)) return;
            myBanks.push({ name, balance });
            saveAndRender();
            document.getElementById('bank-name').value = '';
            document.getElementById('bank-balance').value = '';
        }

        function addOtherAsset() {
            const name = document.getElementById('other-name').value.trim();
            const value = parseFloat(document.getElementById('other-value').value) || 0;
            const loan = parseFloat(document.getElementById('other-loan').value) || 0;
            if (!name) return;
            myOthers.push({ name, value, loan });
            saveAndRender();
            document.getElementById('other-name').value = '';
            document.getElementById('other-value').value = '';
            document.getElementById('other-loan').value = '';
        }

        function deleteItem(type, index) {
            if (confirm("確定刪除此項資產？")) {
                if (type === 'stock') myPortfolio.splice(index, 1);
                if (type === 'bank') myBanks.splice(index, 1);
                if (type === 'other') myOthers.splice(index, 1);
                saveAndRender();
            }
        }

        function saveAndRender() {
            localStorage.setItem('myPortfolio', JSON.stringify(myPortfolio));
            localStorage.setItem('myBanks', JSON.stringify(myBanks));
            localStorage.setItem('myOthers', JSON.stringify(myOthers));
            renderUI();
        }

        function renderUI() {
            let stockTotal = 0, bankTotal = 0, otherTotal = 0;

            // 投資渲染 (深色 PWA 版)
            const stockBody = document.getElementById('stock-body-mobile');
            stockBody.innerHTML = '';
            myPortfolio.forEach((item, i) => {
                const p = marketPrices[item.code] || 0;
                const sub = p * item.amount;
                stockTotal += sub;
                stockBody.innerHTML += `
                    <div class="flex justify-between items-center p-4 bg-slate-800 rounded-2xl mb-2.5 border border-slate-700 shadow-md">
                        <div>
                            <div class="font-black text-slate-100 glow-blue text-base">${item.code}</div>
                            <div class="text-[10px] text-slate-500 font-bold">${item.amount.toLocaleString()} 股 @ ${p.toLocaleString()}</div>
                        </div>
                        <div class="flex items-center gap-4">
                            <div class="text-right font-mono font-black text-indigo-300">NT$ ${sub.toLocaleString(undefined, {maximumFractionDigits: 0})}</div>
                            <button onclick="deleteItem('stock', ${i})" class="text-slate-600 hover:text-red-500 text-lg transition-colors">✕</button>
                        </div>
                    </div>`;
            });

            // 銀行渲染
            const bankList = document.getElementById('bank-list');
            bankList.innerHTML = '';
            myBanks.forEach((item, i) => {
                bankTotal += item.balance;
                bankList.innerHTML += `<div class="flex justify-between p-4 bg-slate-800 rounded-2xl text-sm font-bold border border-slate-700 shadow-md group"><span class="text-slate-400">${item.name}</span><div class="flex gap-4"><span class="text-slate-100 glow-green">NT$ ${item.balance.toLocaleString(undefined, {maximumFractionDigits: 0})}</span><button onclick="deleteItem('bank', ${i})" class="text-slate-600 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-all">✕</button></div></div>`;
            });

            // 其他資產渲染
            const otherList = document.getElementById('other-list');
            otherList.innerHTML = '';
            myOthers.forEach((item, i) => {
                const net = item.value - item.loan;
                otherTotal += net;
                otherList.innerHTML += `<div class="p-4 bg-slate-800 rounded-2xl border border-slate-700 shadow-md group mb-1"><div class="flex justify-between items-center mb-1"><span class="font-black text-slate-200">${item.name}</span><button onclick="deleteItem('other', ${i})" class="text-slate-600 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-all">✕</button></div><div class="flex justify-between text-[10px] font-bold text-slate-500 font-mono mb-1"><span>市值 ${item.value.toLocaleString(undefined, {maximumFractionDigits: 0})}</span><span>貸款 -${item.loan.toLocaleString(undefined, {maximumFractionDigits: 0})}</span></div><div class="text-right font-black text-amber-300 glow-amber text-sm">淨值 NT$ ${net.toLocaleString(undefined, {maximumFractionDigits: 0})}</div></div>`;
            });

            // 更新總覽標籤
            document.getElementById('stock-total-label').innerText = `NT$ ${stockTotal.toLocaleString(undefined, {maximumFractionDigits: 0})}`;
            document.getElementById('bank-total-label').innerText = `NT$ ${bankTotal.toLocaleString(undefined, {maximumFractionDigits: 0})}`;
            document.getElementById('other-total-label').innerText = `NT$ ${otherTotal.toLocaleString(undefined, {maximumFractionDigits: 0})}`;
            
            // 更新霓虹總資產
            const grandTotal = stockTotal + bankTotal + otherTotal;
            document.getElementById('grand-total').innerText = `NT$ ${grandTotal.toLocaleString(undefined, {maximumFractionDigits: 0})}`;
        }

        function clearAllData() { if (confirm("這會永久清空手機上的資產紀錄，確定嗎？")) { localStorage.clear(); location.reload(); } }

        // 啟動
        initData();
    </script>
</body>
</html>
